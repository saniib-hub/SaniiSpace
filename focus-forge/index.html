<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Focus Forge</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Focus Forge</h1>
      <div class="streak" id="streak">
        <span class="flame">🔥</span>
        <span id="streakCount">0</span>
        <span class="streak-label">sessions today</span>
      </div>
    </header>

    <div class="modes" id="modes">
      <button class="mode-btn active" data-mode="focus">Focus</button>
      <button class="mode-btn" data-mode="short">Short Break</button>
      <button class="mode-btn" data-mode="long">Long Break</button>
    </div>

    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 220 220">
        <circle class="ring-track" cx="110" cy="110" r="100"></circle>
        <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="100"></circle>
      </svg>
      <div class="time-display">
        <span id="timeLeft">25:00</span>
        <span class="mode-name" id="modeName">Focus</span>
      </div>
    </div>

    <div class="controls">
      <button id="startPause" class="primary">Start</button>
      <button id="reset">Reset</button>
      <button id="skip">Skip</button>
    </div>

    <details class="settings">
      <summary>Settings</summary>
      <div class="settings-grid">
        <label>Focus (min)
          <input type="number" id="focusLen" min="1" max="120" value="25" />
        </label>
        <label>Short break (min)
          <input type="number" id="shortLen" min="1" max="60" value="5" />
        </label>
        <label>Long break (min)
          <input type="number" id="longLen" min="1" max="90" value="15" />
        </label>
        <label>Sessions before long break
          <input type="number" id="cycleLen" min="1" max="12" value="4" />
        </label>
        <label class="checkbox">
          <input type="checkbox" id="soundToggle" checked />
          Play sound on completion
        </label>
      </div>
    </details>

    <div class="celebration" id="celebration"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
